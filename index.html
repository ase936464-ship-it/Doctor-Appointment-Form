<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Appointment Form</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="parent">

        <div class="image">
            <img src="images/photo_2026-06-28_21-49-58.jpg" alt="Doctor">
        </div>

        <div class="form">

            <h1>Doctor Appointment Form</h1>
            <hr>

            <form action="">

                <label>Appointment Date</label>
                <input type="date">
                <br><br>

                <label>Appointment Time</label>
                <input type="time">
                <br><br>

                <label>Name</label>
                <input type="text" placeholder="First Name">
                <input type="text" placeholder="Last Name">
                <br><br>

                <label>Gender</label>

                <input type="radio" name="gender">
                <span>Male</span>

                <input type="radio" name="gender">
                <span>Female</span>

                <br><br>

                <label>Phone</label>
                <input type="text" placeholder="####">
                <br><br>

                <label>Address</label>
                <input type="text" placeholder="City">
                <input type="text" placeholder="State">
                <br><br>

                <label>Your Query</label>
                <br>
                <textarea rows="6" cols="45"></textarea>

                <br><br>

                <label>Appointment Type</label>
                <br>

                <input type="checkbox">
                <span>Cervix checkup</span>
                <br>

                <input type="checkbox">
                <span>Heart checkup</span>
                <br>

                <input type="checkbox">
                <span>Eye check-up</span>
                <br>

                <input type="checkbox">
                <span>Hearing Test</span>

                <br><br>

                <button type="submit">Send</button>

            </form>

        </div>

    </div>

</body>

</html>
